# ====================================================================================
# update_currency_rates.yml — GitHub Action для автоматичного оновлення курсів валют
# ====================================================================================
# 
# ЩО ЦЕ ТАКЕ:
# -----------
# Це інструкція для GitHub, яка запускає автоматичне оновлення курсів валют щодня.
# GitHub Action — це автоматичний скрипт, який GitHub виконує за розкладом.
# Він працює безкоштовно до 2000 хвилин на місяць (близько 60 запусків на місяць).
#
# ЯК ЦЕ ПРАЦЮЄ:
# -------------
# 1. Щодня о ~18:00 за Польщею (після публікації курсів НБП) GitHub запускає цей процес
# 2. GitHub створює тимчасовий комп'ютер (віртуальну машину) в хмарі
# 3. Завантажує ваш код з репозиторію
# 4. Встановлює Python та потрібні бібліотеки (pandas, requests)
# 5. Запускає Python-скрипт update_currency_rates.py
# 6. Python-скрипт завантажує курси з API НБП та САМ СТВОРЮЄ (або оновлює) файл currency_rates.csv
# 7. Команди Git забирають цей створений файл і зберігають його назад у ваш репозиторій на GitHub
#
# ДЛЯ ЧОГО ЦЕ ПОТРІБНО:
# ---------------------
# Головний додаток (калькулятор FIFO) читає курси з currency_rates.csv.
# Цей файл має бути завжди актуальним. GitHub Action оновлює його щодня.
# ====================================================================================

# НАЗВА РОБОЧОГО ПРОЦЕСУ
# Цю назву ви побачите у вкладці "Actions" на GitHub
name: Aktualizacja kursów walut NBP

# ========================== ТРИГЕРИ ЗАПУСКУ ==========================
# Тут вказуємо, КОЛИ і ЯК запускати цей процес
on:
  # ЗАПУСК ЗА РОЗКЛАДОМ (CRON)
  # "0 16 * * *" означає: щодня о 16:00 за UTC (всесвітнім часом)
  # Це відповідає ~18:00 за польським часом влітку (CEST, UTC+2) і ~17:00 взимку (CET, UTC+1)
  #
  # ЧОМУ САМЕ ЦЕЙ ЧАС:
  # НБП публікує курси (таблиця A) щодня між 11:45 і 12:15 за варшавським часом.
  # Запуск о 16:00 UTC дає з запасом понад 3 години після публікації, щоб дані
  # точно вже були в API НБП на момент запуску скрипта.
  
  schedule:
   - cron: '0 16 * * *'
  
  # ЗАПУСК ВРУЧНУ (workflow_dispatch)
  # Це дозволяє вам запустити процес вручну через інтерфейс GitHub
  # Кнопка "Run workflow" з'явиться у вкладці "Actions"
  workflow_dispatch:
  
  # ЗАПУСК ПРИ ПУШІ (для тестування)
  # Кожного разу, коли ви робите commit, Action буде запускатись
  push:
    branches: [ main ]

# ========================== БЛОКУВАННЯ ПАРАЛЕЛЬНИХ ЗАПУСКІВ ==========================
# Якщо запуститься новий процес, поки старий ще виконується,
# старий буде скасовано. Це запобігає конфліктам при одночасному записі в файл.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

# ========================== ПРАВА ДОСТУПУ ==========================
# Надаємо дозвіл на запис у репозиторій
# Без цього GitHub не зможе зберегти оновлений файл
permissions:
  contents: write

# ========================== ЗАВДАННЯ (JOBS) ==========================
# Тут описуємо, які саме дії потрібно виконати
jobs:
  # НАЗВА ЗАВДАННЯ: update-rates (можна назвати будь-як)
  update-rates:
    # ТИП СЕРВЕРА: використовуємо найновішу версію Ubuntu Linux
    runs-on: ubuntu-latest
    
    # ==================== КРОКИ ВИКОНАННЯ ====================
    steps:
      # КРОК 1: ЗАВАНТАЖИТИ КОД З РЕПОЗИТОРІЮ
      # actions/checkout@v4 — це готова дія від GitHub
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@v4
      
      # КРОК 2: ВСТАНОВИТИ PYTHON
      # actions/setup-python@v5 — встановлює потрібну версію Python
      - name: Ustawienie Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'   # Версія Python, яка використовується в проекті
      
      # КРОК 3: ВСТАНОВИТИ НЕОБХІДНІ БІБЛІОТЕКИ
      # pip install — команда Python для встановлення бібліотек
      # pandas — потрібен для роботи з таблицями даних
      # requests — потрібен для запитів до API НБП
      - name: Instalacja zależności
        run: |
          pip install pandas requests
      
      # КРОК 4: ЗАПУСТИТИ PYTHON-СКРИПТ, ЯКИЙ СТВОРЮЄ ФАЙЛ З КУРСАМИ
      # Цей скрипт (update_currency_rates.py) завантажує курси з API НБП
      # і САМ СТВОРЮЄ (або оновлює) файл currency_rates.csv у поточній папці
      - name: Uruchomienie skryptu aktualizacji kursów
        run: python .github/workflows/update_currency_rates.py
      
      # КРОК 5: ЗБЕРЕГТИ СТВОРЕНИЙ ФАЙЛ У РЕПОЗИТОРІЙ
      # Тут ми беремо файл currency_rates.csv, який щойно створив Python-скрипт,
      # і за допомогою команд Git зберігаємо його в репозиторії на GitHub
      - name: Zapisanie zmian w repozytorium
        run: |
          # Встановлюємо ім'я користувача для коміту (видно в історії змін)
          git config user.name "github-actions[bot]"
          # Встановлюємо email для цього бота
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Додаємо створений файл до коміту
          git add currency_rates.csv
          # Робимо коміт з повідомленням, що містить сьогоднішню дату
          # Якщо файл не змінився (немає нових курсів), команда не виконається
          git commit -m "Automatyczna aktualizacja kursów walut NBP $(date +'%Y-%m-%d')" || echo "Brak zmian do zatwierdzenia"
          # Відправляємо зміни на GitHub
          git push
